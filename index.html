<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BELUGA DKP</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wow: {
              gold: "#ffd100",
              brown: "#1a120b",
              panel: "#1e1a14",
              border: "#5c4a1e",
              hover: "#2e2618"
            }
          }
        }
      }
    }
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #0f0d09; color: #e8d5a3; font-family: "Segoe UI", sans-serif; }
    th { cursor: pointer; user-select: none; }
    th:hover { color: #ffd100; }
    th .sort-icon { margin-left: 4px; opacity: 0.4; }
    th.sorted .sort-icon { opacity: 1; color: #ffd100; }
    .cls-warrior { color: #c79c6e; }
    .cls-paladin { color: #f58cba; }
    .cls-hunter { color: #abd473; }
    .cls-rogue { color: #fff569; }
    .cls-priest { color: #ffffff; }
    .cls-shaman { color: #0070de; }
    .cls-mage { color: #69ccf0; }
    .cls-warlock { color: #9482c9; }
    .cls-druid { color: #ff7d0a; }
    .cls-deathknight { color: #c41f3b; }
  </style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col gap-3 md:flex-row md:items-end mb-6">
      <div>
        <h1 class="text-3xl font-bold text-wow-gold tracking-wide">BELUGA DKP</h1>
        <p id="last-scan" class="text-sm text-yellow-600 mt-1">Loading...</p>
      </div>
      <div class="md:ml-auto">
        <label class="text-xs text-yellow-700 block mb-1">Snapshot</label>
        <select id="snapshot-select"
          class="bg-wow-panel border border-wow-border text-yellow-200 rounded px-3 py-1.5 text-sm focus:outline-none">
          <option value="">Loading...</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6" id="stats-bar">
      <div class="bg-wow-panel border border-wow-border rounded-lg p-4 text-center">
        <div id="stat-total" class="text-2xl font-bold text-wow-gold">-</div>
        <div class="text-xs text-yellow-700 mt-1">Members</div>
      </div>
      <div class="bg-wow-panel border border-wow-border rounded-lg p-4 text-center">
        <div id="stat-with-dkp" class="text-2xl font-bold text-wow-gold">-</div>
        <div class="text-xs text-yellow-700 mt-1">With DKP</div>
      </div>
    </div>

    <div class="flex gap-3 mb-4">
      <input id="search" type="text" placeholder="Search member..."
        class="bg-wow-panel border border-wow-border text-yellow-200 rounded px-3 py-1.5 text-sm flex-1 focus:outline-none focus:border-wow-gold" />
      <select id="class-filter"
        class="bg-wow-panel border border-wow-border text-yellow-200 rounded px-3 py-1.5 text-sm focus:outline-none">
        <option value="">All classes</option>
      </select>
    </div>

    <div class="overflow-x-auto rounded-lg border border-wow-border mb-10">
      <table class="w-full text-sm" id="dkp-table">
        <thead class="bg-wow-panel">
          <tr>
            <th class="px-4 py-3 text-left text-yellow-600 font-semibold" data-col="name">
              Name <span class="sort-icon">▲</span>
            </th>
            <th class="px-4 py-3 text-left text-yellow-600 font-semibold" data-col="rank">
              Rank <span class="sort-icon">▲</span>
            </th>
            <th class="px-4 py-3 text-left text-yellow-600 font-semibold" data-col="class">
              Class <span class="sort-icon">▲</span>
            </th>
            <th class="px-4 py-3 text-center text-yellow-600 font-semibold" data-col="level">
              Lvl <span class="sort-icon">▲</span>
            </th>
            <th class="px-4 py-3 text-right text-yellow-600 font-semibold" data-col="dkp0">
              DKP I <span class="sort-icon">▲</span>
            </th>
            <th class="px-4 py-3 text-right text-yellow-600 font-semibold" data-col="dkp1">
              DKP II <span class="sort-icon">▲</span>
            </th>
          </tr>
        </thead>
        <tbody id="dkp-body" class="divide-y divide-wow-border">
          <tr><td colspan="6" class="text-center py-8 text-yellow-700">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <section id="player-logs-section" class="bg-wow-panel border border-wow-border rounded-xl p-4 md:p-5">
      <div class="flex flex-col gap-4 md:flex-row md:items-end">
        <div class="flex-1">
          <label class="text-xs text-yellow-700 block mb-1">Player logs</label>
          <input id="log-player-input" list="member-names" type="text" placeholder="Enter exact player name"
            class="w-full bg-[#120f0b] border border-wow-border text-yellow-100 rounded px-3 py-2 text-sm focus:outline-none focus:border-wow-gold" />
          <datalist id="member-names"></datalist>
        </div>
        <div>
          <label class="text-xs text-yellow-700 block mb-1">Kind</label>
          <select id="log-kind-filter"
            class="bg-[#120f0b] border border-wow-border text-yellow-200 rounded px-3 py-2 text-sm focus:outline-none">
            <option value="">All kinds</option>
          </select>
        </div>
        <div>
          <button id="load-player-logs"
            class="bg-wow-gold text-black font-semibold rounded px-4 py-2 text-sm hover:brightness-95 transition">
            Load logs
          </button>
        </div>
      </div>

      <div class="flex flex-col gap-1 md:flex-row md:items-center md:justify-between mt-4 mb-3">
        <p id="log-status" class="text-sm text-yellow-600">Enter a player name to load their target logs.</p>
        <p id="log-count" class="text-xs text-yellow-700"></p>
      </div>

      <div class="overflow-x-auto rounded-lg border border-wow-border">
        <table class="w-full text-sm">
          <thead class="bg-[#17130e]">
            <tr>
              <th class="px-4 py-3 text-left text-yellow-600 font-semibold">Date</th>
              <th class="px-4 py-3 text-left text-yellow-600 font-semibold">Kind</th>
              <th class="px-4 py-3 text-left text-yellow-600 font-semibold">Actor</th>
              <th class="px-4 py-3 text-left text-yellow-600 font-semibold">Table</th>
              <th class="px-4 py-3 text-right text-yellow-600 font-semibold">Delta</th>
              <th class="px-4 py-3 text-right text-yellow-600 font-semibold">Before</th>
              <th class="px-4 py-3 text-right text-yellow-600 font-semibold">After</th>
              <th class="px-4 py-3 text-left text-yellow-600 font-semibold">Item / Reason</th>
            </tr>
          </thead>
          <tbody id="log-body" class="divide-y divide-wow-border">
            <tr><td colspan="8" class="text-center py-8 text-yellow-700">No logs loaded.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <p class="text-xs text-yellow-800 text-center mt-4">
      Data synced from Turtle WoW officer notes and operation logs
    </p>
  </div>

  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allMembers = [];
    let sortCol = "dkp0";
    let sortAsc = false;
    let allPlayerLogs = [];

    async function loadSnapshotList() {
      const sel = document.getElementById("snapshot-select");
      sel.innerHTML = "";

      const snap = await db.collection(COLLECTION_NAME)
        .orderBy("scanTime", "desc")
        .limit(50)
        .get();

      if (snap.empty) {
        sel.innerHTML = '<option value="">No snapshots yet</option>';
        return;
      }

      snap.forEach(doc => {
        const data = doc.data();
        const date = data.scanTime
          ? new Date(data.scanTime * 1000).toLocaleString()
          : doc.id;
        const opt = document.createElement("option");
        opt.value = doc.id;
        opt.textContent = date;
        sel.appendChild(opt);
      });

      loadSnapshot(snap.docs[0].id);

      sel.addEventListener("change", () => {
        if (sel.value) loadSnapshot(sel.value);
      });
    }

    async function loadSnapshot(docId) {
      const doc = await db.collection(COLLECTION_NAME).doc(docId).get();
      if (!doc.exists) return;
      const data = doc.data();

      const scanDate = data.scanTime
        ? new Date(data.scanTime * 1000).toLocaleString()
        : "unknown";
      document.getElementById("last-scan").textContent = "Last scan: " + scanDate;

      allMembers = Object.values(data.members || {});

      const withDKP = allMembers.filter(m => m.dkp && m.dkp.length > 0).length;
      document.getElementById("stat-total").textContent = allMembers.length;
      document.getElementById("stat-with-dkp").textContent = withDKP;

      const classes = [...new Set(allMembers.map(m => m.class).filter(Boolean))].sort();
      const cf = document.getElementById("class-filter");
      cf.innerHTML = '<option value="">All classes</option>';
      classes.forEach(c => {
        const o = document.createElement("option");
        o.value = c;
        o.textContent = c;
        cf.appendChild(o);
      });

      const names = [...new Set(allMembers.map(m => m.name).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      const datalist = document.getElementById("member-names");
      datalist.innerHTML = names.map(name => `<option value="${escAttr(name)}"></option>`).join("");

      renderMembers();
    }

    function renderMembers() {
      const search = document.getElementById("search").value.toLowerCase();
      const classF = document.getElementById("class-filter").value;

      let rows = allMembers.filter(m => {
        if (search && !m.name.toLowerCase().includes(search)) return false;
        if (classF && m.class !== classF) return false;
        return true;
      });

      rows.sort((a, b) => {
        let va;
        let vb;

        if (sortCol === "dkp0" || sortCol === "dkp1") {
          const idx = sortCol === "dkp0" ? 0 : 1;
          va = (a.dkp && a.dkp[idx] != null) ? a.dkp[idx] : -Infinity;
          vb = (b.dkp && b.dkp[idx] != null) ? b.dkp[idx] : -Infinity;
        } else if (sortCol === "level") {
          va = a.level || 0;
          vb = b.level || 0;
        } else if (sortCol === "rank") {
          va = a.rankIndex != null ? a.rankIndex : 99;
          vb = b.rankIndex != null ? b.rankIndex : 99;
        } else {
          va = (a[sortCol] || "").toLowerCase();
          vb = (b[sortCol] || "").toLowerCase();
        }

        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
      });

      const tbody = document.getElementById("dkp-body");
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-yellow-700">No members found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(m => {
        const cls = (m.class || "").toLowerCase().replace(/\s+/g, "");
        const dkp0 = (m.dkp && m.dkp[0] != null) ? m.dkp[0] : "-";
        const dkp1 = (m.dkp && m.dkp[1] != null) ? m.dkp[1] : "-";
        const dkp0cls = typeof dkp0 === "number"
          ? (dkp0 >= 0 ? "text-green-400" : "text-red-400")
          : "text-yellow-700";
        const dkp1cls = typeof dkp1 === "number"
          ? (dkp1 >= 0 ? "text-green-400" : "text-red-400")
          : "text-yellow-700";

        return `
          <tr class="hover:bg-wow-hover transition-colors">
            <td class="px-4 py-2.5 font-medium">
              <button
                type="button"
                class="text-left text-yellow-100 hover:text-wow-gold underline decoration-transparent hover:decoration-wow-gold transition"
                data-player-name="${escAttr(m.name)}">
                ${escHtml(m.name)}
              </button>
            </td>
            <td class="px-4 py-2.5 text-yellow-500">${escHtml(m.rank || "")}</td>
            <td class="px-4 py-2.5 cls-${cls}">${escHtml(m.class || "")}</td>
            <td class="px-4 py-2.5 text-center text-yellow-400">${m.level || "-"}</td>
            <td class="px-4 py-2.5 text-right font-mono ${dkp0cls}">${dkp0}</td>
            <td class="px-4 py-2.5 text-right font-mono ${dkp1cls}">${dkp1}</td>
          </tr>`;
      }).join("");

      document.querySelectorAll("#dkp-table th").forEach(th => {
        const col = th.dataset.col;
        th.classList.toggle("sorted", col === sortCol);
        const icon = th.querySelector(".sort-icon");
        if (col === sortCol) {
          icon.textContent = sortAsc ? "▲" : "▼";
        } else {
          icon.textContent = "▲";
        }
      });
    }

    async function loadPlayerLogs() {
      const playerInput = document.getElementById("log-player-input");
      const playerName = playerInput.value.trim();
      const status = document.getElementById("log-status");
      const count = document.getElementById("log-count");
      const tbody = document.getElementById("log-body");

      if (!playerName) {
        status.textContent = "Enter a player name to load their target logs.";
        count.textContent = "";
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-yellow-700">No logs loaded.</td></tr>';
        return;
      }

      status.textContent = "Loading logs for " + playerName + "...";
      count.textContent = "";
      tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-yellow-700">Loading...</td></tr>';

      const targetKey = normalizeName(playerName);
      const snap = await db.collection(LOG_COLLECTION_NAME)
        .where("targetKey", "==", targetKey)
        .limit(500)
        .get();

      allPlayerLogs = snap.docs.map(doc => doc.data());
      allPlayerLogs.sort((a, b) => (b.ts || 0) - (a.ts || 0));

      status.textContent = "Showing logs where target is " + playerName + ".";
      renderPlayerLogs();
    }

    function renderPlayerLogs() {
      const kind = document.getElementById("log-kind-filter").value;
      const tbody = document.getElementById("log-body");
      const count = document.getElementById("log-count");

      let rows = allPlayerLogs;
      if (kind) {
        rows = rows.filter(row => row.kind === kind);
      }

      const kinds = [...new Set(allPlayerLogs.map(row => row.kind).filter(Boolean))].sort();
      const kindSelect = document.getElementById("log-kind-filter");
      const currentValue = kindSelect.value;
      kindSelect.innerHTML = '<option value="">All kinds</option>';
      kinds.forEach(value => {
        const opt = document.createElement("option");
        opt.value = value;
        opt.textContent = value;
        kindSelect.appendChild(opt);
      });
      kindSelect.value = kinds.includes(currentValue) ? currentValue : "";

      count.textContent = rows.length ? `${rows.length} event(s)` : "0 events";

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-yellow-700">No matching logs found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const delta = firstDefined(row.delta, row.deltaEP, row.deltaGP);
        const before = firstDefined(row.before, row.beforeEP, row.beforeGP);
        const after = firstDefined(row.after, row.afterEP, row.afterGP);
        const deltaClass = typeof delta === "number"
          ? (delta >= 0 ? "text-green-400" : "text-red-400")
          : "text-yellow-500";
        const itemText = row.itemName || row.reason || "-";

        return `
          <tr class="hover:bg-wow-hover transition-colors">
            <td class="px-4 py-2.5 text-yellow-400 whitespace-nowrap">${escHtml(formatEventDate(row))}</td>
            <td class="px-4 py-2.5">${escHtml(row.kind || "-")}</td>
            <td class="px-4 py-2.5">${escHtml(row.actor || "-")}</td>
            <td class="px-4 py-2.5">${escHtml(row.tableName || row.tableKey || "-")}</td>
            <td class="px-4 py-2.5 text-right font-mono ${deltaClass}">${formatValue(delta)}</td>
            <td class="px-4 py-2.5 text-right font-mono text-yellow-200">${formatValue(before)}</td>
            <td class="px-4 py-2.5 text-right font-mono text-yellow-200">${formatValue(after)}</td>
            <td class="px-4 py-2.5">${escHtml(itemText)}</td>
          </tr>`;
      }).join("");
    }

    function normalizeName(value) {
      return String(value || "").trim().toLowerCase();
    }

    function firstDefined() {
      for (const value of arguments) {
        if (value != null) return value;
      }
      return null;
    }

    function formatValue(value) {
      return value == null ? "-" : String(value);
    }

    function formatEventDate(row) {
      if (row.dateText) return row.dateText;
      if (row.ts) return new Date(row.ts * 1000).toLocaleString();
      return "-";
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escAttr(s) {
      return escHtml(s);
    }

    document.querySelectorAll("#dkp-table th[data-col]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.col;
        if (sortCol === col) sortAsc = !sortAsc;
        else {
          sortCol = col;
          sortAsc = false;
        }
        renderMembers();
      });
    });

    document.getElementById("search").addEventListener("input", renderMembers);
    document.getElementById("class-filter").addEventListener("change", renderMembers);
    document.getElementById("load-player-logs").addEventListener("click", loadPlayerLogs);
    document.getElementById("log-kind-filter").addEventListener("change", renderPlayerLogs);
    document.getElementById("log-player-input").addEventListener("keydown", event => {
      if (event.key === "Enter") {
        loadPlayerLogs();
      }
    });
    document.getElementById("dkp-body").addEventListener("click", event => {
      const button = event.target.closest("[data-player-name]");
      if (!button) return;

      const playerName = button.getAttribute("data-player-name");
      document.getElementById("log-player-input").value = playerName;
      loadPlayerLogs();

      const section = document.getElementById("player-logs-section");
      if (section) {
        section.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });

    loadSnapshotList();
  </script>
</body>
</html>
